<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROSCA — the table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@500;600;700;800&family=Wix+Madefor+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#5B7FFF; --blue-deep:#3B5BE0; --blue-press:#2E49C4; --blue-300:#9AB0FF;
  --blue-100:#C9D5FF; --tint:#E9EEFF; --line:#D6E0FF; --line-2:#E8ECFA;
  --bg:#F2F5FD; --paper:#FFFFFF; --ink:#0C1226; --ink-2:#2B3650; --muted:#5E6A85;
  --display:'Wix Madefor Display',sans-serif; --body:'Wix Madefor Text',sans-serif;
  --sh:0 1px 2px rgba(46,73,196,.05),0 24px 50px -28px rgba(46,73,196,.30);
  --sim:#F59E0B; --sim-deep:#B45305; --sim-bg:#FFF7E8; --sim-line:#F4CC7B;
  --under:#101623;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--body);background:var(--bg);color:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background-image:linear-gradient(#5b7fff0d 1px,transparent 1px),linear-gradient(90deg,#5b7fff0d 1px,transparent 1px);
  background-size:46px 46px;}
.deckbar{font-weight:700;font-size:11px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--blue-deep);display:flex;align-items:center;gap:10px;}
.deckbar::before{content:"";width:26px;height:2px;background:var(--blue);border-radius:2px;}
#frame{width:394px;height:812px;background:linear-gradient(180deg,#1A2140,#0A0E1F);
  border:1px solid #39406A;border-radius:38px;padding:10px;box-shadow:0 40px 80px -30px rgba(12,18,38,.55);
  position:relative;flex:0 0 auto;}
#phone{width:100%;height:100%;background:var(--bg);border-radius:28px;overflow:hidden;
  position:relative;display:flex;flex-direction:column;transition:background .4s;}
#phone.dark{background:var(--under);}
@media (max-width:480px),(max-height:860px){
  body{gap:0;background:var(--bg);}
  .deckbar{display:none;}
  #frame{width:100vw;height:100dvh;border-radius:0;border:none;padding:0;box-shadow:none;}
  #phone{border-radius:0;}
}
#sb{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px 4px;font-weight:700;font-size:13px;color:var(--ink);}
#phone.dark #sb{color:#E8ECF2;}
#sb .r{font-size:11px;color:var(--ink-2);}
#phone.dark #sb .r{color:#8E99B9;}
#app{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;scrollbar-width:none;}
#app::-webkit-scrollbar{display:none;}
.hd{padding:2px 18px 0;}
.eyebrow{font-weight:700;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--blue-deep);}
#phone.dark .eyebrow{color:var(--blue-300);}
h1.big{font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:-.02em;margin:2px 0 0;}
#phone.dark h1.big{color:#F3F6FA;}
.sub{font-size:12.5px;color:var(--muted);line-height:1.45;}
svg text{font-family:var(--body);}
svg .dn{font-family:var(--display);}
.stage{display:block;margin:0 auto;}
g[onclick]{cursor:pointer;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.pulse{animation:pulse 1.6s ease-in-out infinite;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;
  box-shadow:var(--sh);padding:16px;margin-top:12px;}
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2);}
.row:last-child{border-bottom:none;}
.av{flex:0 0 34px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:13px;color:#fff;background:var(--blue);}
.av.b2{background:var(--blue-deep);} .av.b3{background:var(--blue-300);}
.av.lt{background:var(--blue-100);color:var(--blue-deep);} .av.lt2{background:#E6ECFF;color:var(--blue-deep);}
.row .nm{flex:1;font-weight:600;font-size:14px;}
.row .nm small{display:block;font-weight:500;font-size:11px;color:var(--muted);margin-top:1px;}
.row .st{font-size:11.5px;font-weight:700;color:var(--blue-deep);}
.btn{display:block;width:100%;border:none;border-radius:999px;background:var(--blue);color:#fff;
  font-family:var(--body);font-weight:700;font-size:15px;padding:14px;cursor:pointer;margin-top:14px;}
.btn:active{background:var(--blue-press);}
.btn.sec{background:#fff;color:var(--blue-deep);border:1.5px solid var(--blue);}
.btn:disabled{opacity:.45;}
.split2{display:flex;gap:10px;margin-top:14px;}
.split2 .btn{margin-top:0;flex:1;}
.note{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:10px;}
.banner{display:flex;gap:10px;align-items:flex-start;background:var(--tint);border:1px solid var(--line);
  border-radius:14px;padding:12px;margin-top:12px;font-size:12.5px;color:var(--ink-2);line-height:1.45;}
.okband{background:#EAF7EE;border:1px solid #BFE5C8;color:#1D6B33;border-radius:14px;
  padding:12px;margin-top:12px;font-size:12.5px;font-weight:600;}
.pendband{background:var(--sim-bg);border:1px dashed var(--sim);color:var(--sim-deep);border-radius:14px;
  padding:12px;margin-top:12px;font-size:12.5px;font-weight:600;line-height:1.5;}
#modal{position:absolute;inset:0;background:var(--bg);z-index:20;display:none;flex-direction:column;overflow-y:auto;}
#modal.on{display:flex;}
#modal .mhead{display:flex;align-items:center;gap:10px;padding:14px 18px 4px;}
#modal .mhead .back{border:none;background:var(--paper);border:1px solid var(--line);width:34px;height:34px;
  border-radius:50%;font-size:16px;color:var(--ink-2);cursor:pointer;}
#modal .mbody{padding:6px 18px 40px;}
.pindots{display:flex;gap:12px;justify-content:center;margin:22px 0;}
.pindots i{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--blue-300);}
.pindots i.on{background:var(--blue);border-color:var(--blue);}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:250px;margin:0 auto;}
.pad button{background:var(--paper);border:1px solid var(--line);border-radius:16px;
  font-family:var(--display);font-weight:700;font-size:20px;padding:14px 0;cursor:pointer;color:var(--ink);}
.pad button:active{background:var(--tint);}
.amt{font-family:var(--display);font-weight:800;font-size:40px;text-align:center;margin:18px 0 4px;letter-spacing:-.02em;}
.amt small{font-size:16px;color:var(--muted);}
.quick{display:flex;gap:8px;justify-content:center;margin:8px 0 14px;}
.quick button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;
  font-weight:700;font-size:12.5px;color:var(--blue-deep);cursor:pointer;}
.paywho{display:flex;gap:8px;margin-top:10px;}
.paywho button{flex:1;border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 6px;
  font-size:11.5px;font-weight:600;color:var(--ink-2);cursor:pointer;}
.paywho button.on{border-color:var(--blue);background:var(--tint);color:var(--blue-deep);font-weight:700;}
.bigok{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0 20px;}
.bigok .disc{width:86px;height:86px;border-radius:50%;background:var(--blue);display:flex;align-items:center;
  justify-content:center;animation:pop .45s cubic-bezier(.16,1,.3,1);}
@keyframes pop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.bigok svg{width:40px;height:40px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.bigok h2{font-family:var(--display);font-weight:800;font-size:20px;margin-top:16px;}
#toast{position:absolute;left:14px;right:14px;top:14px;z-index:60;background:var(--ink);color:#fff;
  border-radius:14px;padding:12px 14px;font-size:12.5px;font-weight:600;display:none;
  box-shadow:0 18px 40px -12px rgba(12,18,38,.5);line-height:1.4;}
#toast.on{display:block;animation:tin .3s cubic-bezier(.16,1,.3,1);}
@keyframes tin{from{transform:translateY(-16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
#toast.sim{background:var(--sim-deep);}
#fab{position:absolute;right:12px;bottom:18px;z-index:40;border:2px dashed var(--sim-deep);
  background:repeating-linear-gradient(45deg,var(--sim),var(--sim) 10px,#f8b83d 10px,#f8b83d 20px);
  color:#5b3305;font-family:var(--body);font-weight:800;font-size:11px;letter-spacing:.08em;
  border-radius:14px;padding:10px 12px;cursor:pointer;box-shadow:0 12px 26px -10px rgba(180,83,9,.55);}
#scrim{position:absolute;inset:0;background:rgba(12,18,38,.45);z-index:45;display:none;}
#scrim.on{display:block;}
#sheet{position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--sim-bg);
  border:2px dashed var(--sim-deep);border-bottom:none;border-radius:22px 22px 0 0;
  transform:translateY(105%);transition:transform .32s cubic-bezier(.16,1,.3,1);
  max-height:78%;display:flex;flex-direction:column;}
#sheet.on{transform:translateY(0);}
#sheet .shead{padding:14px 16px 10px;border-bottom:1px dashed var(--sim-line);}
#sheet .shead .tag{display:inline-block;background:var(--sim-deep);color:#fff;font-size:9.5px;font-weight:800;
  letter-spacing:.18em;border-radius:6px;padding:3px 8px;}
#sheet .shead h3{font-family:var(--display);font-weight:800;font-size:15px;color:#5b3305;margin-top:7px;}
#sheet .shead p{font-size:11px;color:#8a5a10;margin-top:3px;line-height:1.4;}
#sheet .sbody{overflow-y:auto;padding:10px 16px 20px;}
.slab{font-size:9.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#8a5a10;margin:12px 0 6px;}
.sact{display:flex;align-items:center;gap:11px;width:100%;background:#fff;border:1.5px dashed var(--sim);
  border-radius:14px;padding:11px 12px;margin-bottom:8px;cursor:pointer;text-align:left;font-family:var(--body);}
.sact:disabled{opacity:.4;cursor:default;}
.sact .sav{flex:0 0 32px;width:32px;height:32px;border-radius:50%;background:var(--sim);color:#5b3305;
  font-family:var(--display);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
.sact .stx{flex:1;}
.sact .stx b{display:block;font-size:13px;color:#3d2a05;}
.sact .stx small{display:block;font-size:10.5px;color:#8a5a10;margin-top:1px;line-height:1.35;}
.sclose{margin:2px 16px 16px;border:none;background:none;color:#8a5a10;font-weight:700;font-size:12px;
  text-decoration:underline;cursor:pointer;font-family:var(--body);}
</style>
</head>
<body>
<div class="deckbar">Riften Labs · the table — interactive mockup</div>
<div id="frame"><div id="phone">
  <div id="sb"><span>9:41</span><span class="r">▮▮▮ ⌁</span></div>
  <div id="app"></div>
  <div id="modal"></div>
  <button id="fab" onclick="openSheet()">SIM · OTHER PARTIES</button>
  <div id="scrim" onclick="closeSheet()"></div>
  <div id="sheet"></div>
  <div id="toast"></div>
</div></div>

<script>
/* ============ THE TABLE — the circle IS the interface ============
   One stage: 12 seats, a pot, a week-ring toward Friday. The tin lives under
   the user's seat. Ceremonies (payout, refresh, drill, restore) play ON the
   seats. Other parties act only through the amber SIM layer. */

var POS={A:[197,130],F:[266,149],C:[315,202],Y:[330,268],K:[315,334],H:[266,387],
         B:[128,387],O:[79,334],D:[64,268],S:[79,202],G:[128,149],T:[197,406]};
var NAME={A:'Amaka O.',C:'Chinedu E.',B:'Bisi L.',H:'Halima S.',E:'Emeka',F:'Funke A.',
          Y:'Yemi K.',K:'Kunle A.',O:'Ojo T.',D:'Dele I.',S:'Sade M.',G:'Gbenga F.',T:'You'};
var RING={A:3,C:2,D:1,G:1,F:1,T:2,H:1,B:1,Y:0,K:0,O:0,S:0};
var KEEPERS=['A','C','B','H','E'];   /* E = Emeka, remote — no seat at the table */
var SOLID={A:'#C9D5FF',F:'#3B5BE0',C:'#5B7FFF',H:'#9AB0FF',D:'#5B7FFF',G:'#3B5BE0',T:'#5B7FFF'};

var S={
  phase:'invite', view:'table',
  pinSet:false, funded:false, contributed:false, awaitAgent:false,
  surplus:false, seam:false, ringSet:false, monthSix:false, duress:false,
  friday:0, refreshDone:[], drillDark:false, drillConfirms:[],
  lost:false, restoreConfirms:[], wd:null, suggestDeposit:0, heirFired:false,
  pocket:0, tin:0, round:6, receiver:'A', potMoved:false,
  paid:['A','F','C','D','G'],
};
function fm(x){return '$'+x.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
var tmr=null;
function toast(m,sim){var t=document.getElementById('toast');t.textContent=m;
  t.className='on'+(sim?' sim':'');clearTimeout(tmr);tmr=setTimeout(function(){t.className='';},2600);}

/* ============ render ============ */
function render(){
  var ph=document.getElementById('phone');
  ph.className=(S.view==='under'||S.lost)?'dark':'';
  var app=document.getElementById('app');
  if(S.phase==='invite'){app.innerHTML=inviteHtml();return;}
  if(S.lost){app.innerHTML=newPhoneHtml();return;}
  if(S.view==='under'){app.innerHTML=underHtml();return;}
  app.innerHTML=stageHtml();
}

/* ---- Act 1: the invitation ---- */
function inviteHtml(){
  return '<div data-flow="ob-invite" style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:0 30px;text-align:center">'+
  '<div class="av lt" style="width:64px;height:64px;font-size:24px;margin:0 auto 8px">A</div>'+
  '<h1 class="big">Amaka O. invited you</h1>'+
  '<div class="sub" style="margin-top:4px">Lagos Drivers Ajo</div>'+
  '<div class="sub">12 seats · $100 · Fridays</div>'+
  '<button class="btn" onclick="pinFlow(joinDone,\'Set your PIN\')">Take your seat</button>'+
  '</div>';
}
function joinDone(){S.pinSet=true;S.phase='app';closeModal();render();}

/* ---- the stage ---- */
function seatSvg(k){
  var p=POS[k],x=p[0],y=p[1];
  var isYou=k==='T', r=isYou?21:15;
  var paid=S.paid.indexOf(k)>=0, recv=k===S.receiver;
  var fill,txt='#fff',stroke='';
  if(S.drillDark&&k==='H'){fill='#26304a';txt='#3B4A6B';}
  else if(paid||isYou){fill=SOLID[k]||'#5B7FFF';if(k==='A')txt='#3B5BE0';}
  else if(recv){fill='#C9D5FF';txt='#3B5BE0';}
  else{fill='#EDF1FE';txt='#8E99B9';stroke='stroke="#C9D5FF"';}
  var rings='';
  for(var i=1;i<=(RING[k]||0);i++)rings+='<circle r="'+(r+3+i*3)+'" fill="none" stroke="'+(i===1?'#D6E0FF':'#E8ECFA')+'"/>';
  var badge='';
  if(S.refreshDone.indexOf(k)>=0)badge='<circle cx="'+(r-2)+'" cy="'+(-r+2)+'" r="6" fill="#3B5BE0"/><text x="'+(r-2)+'" y="'+(-r+5)+'" text-anchor="middle" font-size="8" fill="#fff">✓</text>';
  return '<g transform="translate('+x+' '+y+')">'+rings+
    '<circle r="'+r+'" fill="'+fill+'" '+stroke+(isYou?' stroke="#fff" stroke-width="2"':'')+'/>'+
    '<text y="'+(isYou?5:4)+'" text-anchor="middle" class="dn" font-weight="800" font-size="'+(isYou?12:10.5)+'" fill="'+txt+'">'+k+'</text>'+badge+'</g>';
}
function stageHtml(){
  var potPos=S.potMoved?POS[S.receiver]:[197,268];
  var coins='';
  if(!S.potMoved)S.paid.forEach(function(k){
    var p=POS[k],dx=p[0]-197,dy=p[1]-268,L=Math.sqrt(dx*dx+dy*dy);
    coins+='<circle cx="'+(197+dx/L*56).toFixed(1)+'" cy="'+(268+dy/L*56).toFixed(1)+'" r="7" fill="#5B7FFF" stroke="#fff" stroke-width="1.6"/>';
  });
  var recvPath='';
  if(!S.potMoved){
    var rp=POS[S.receiver];
    recvPath='<path d="M'+(197+(rp[0]-197)*.36)+','+(268+(rp[1]-268)*.36)+' L'+(197+(rp[0]-197)*.72)+','+(268+(rp[1]-268)*.72)+'" fill="none" stroke="#9AB0FF" stroke-width="2" stroke-dasharray="3 6"/>';
  }
  var seats='';for(var k in POS)seats+=seatSvg(k);
  var pouch='<g id="pouch" data-flow="pocket-pay" onclick="openPay()" transform="translate(197 462)">'+
    '<rect x="-56" y="-16" width="112" height="34" rx="17" fill="#fff" stroke="#D6E0FF"/>'+
    '<text y="5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0C1226">'+fm(S.pocket)+' <tspan fill="#5E6A85" font-weight="600" font-size="9">MUSD</tspan></text></g>';
  var moneyRow='';
  if(!S.funded){
    moneyRow='<g id="addpill" data-flow="setup" class="pulse" onclick="openAddMoney()" transform="translate(197 502)">'+
      '<rect x="-52" y="-14" width="104" height="28" rx="14" fill="#5B7FFF"/>'+
      '<text y="4" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">Add money</text></g>';
  } else if(!S.contributed&&S.friday===0&&!S.duress){
    moneyRow='<g id="duecoin" data-flow="circle-contribute" onclick="payRound()" transform="translate(197 502)">'+
      '<rect x="-90" y="-14" width="200" height="28" fill="transparent"/><circle cx="-70" r="9" fill="#fff" stroke="#5B7FFF" stroke-width="2" stroke-dasharray="3 3"/>'+
      '<text x="-54" y="4" font-size="10" fill="#5E6A85">$100 · tap to send to the pot</text></g>';
  }
  var floor='';
  if(!S.duress){
    if(S.seam){
      floor='<g id="handle" data-flow="tin-glance" onclick="showUnder()" transform="translate(197 536)">'+
        '<rect x="-130" y="-16" width="260" height="46" fill="transparent"/><line x1="-120" y1="0" x2="120" y2="0" stroke="#D6E0FF" stroke-width="1.5"/>'+
        '<rect x="-23" y="-5" width="46" height="10" rx="5" fill="#E9EEFF" stroke="#C9D5FF"/>'+
        '<text y="22" text-anchor="middle" font-size="9" letter-spacing="1.5" font-weight="700" fill="#8E99B9">THE TIN · '+fm(S.tin)+'</text></g>';
    } else if(S.surplus){
      floor='<g id="handle" data-flow="first-surplus" class="pulse" onclick="guardianPick()" transform="translate(197 536)">'+
        '<rect x="-130" y="-16" width="260" height="46" fill="transparent"/><line x1="-120" y1="0" x2="120" y2="0" stroke="#C9D5FF" stroke-width="1.5"/>'+
        '<rect x="-23" y="-5" width="46" height="10" rx="5" fill="#5B7FFF"/>'+
        '<text y="22" text-anchor="middle" font-size="9" letter-spacing="1.5" font-weight="700" fill="#3B5BE0">THE TIN</text></g>';
    }
  }
  var fri=S.friday>0;
  var week=fri
    ?'<circle cx="197" cy="268" r="172" fill="none" stroke="#5B7FFF" stroke-width="7"/>'
    :'<circle cx="197" cy="268" r="172" fill="none" stroke="#E8ECFA" stroke-width="7"/>'+
     '<path d="M197,96 A172,172 0 1 1 39.4,340" fill="none" stroke="#5B7FFF" stroke-width="7" stroke-linecap="round" transform="rotate(118 197 268)"/>';
  var friPill='<g data-flow="friday-refresh" transform="translate(197 82)"><rect x="-24" y="-13" width="48" height="19" rx="9" fill="'+(fri?'#F59E0B':'#3B5BE0')+'"/>'+
    '<text y="1" text-anchor="middle" font-size="9.5" font-weight="800" fill="#fff">'+(fri?'FRI · LIVE':'FRI')+'</text></g>';
  var hdr=S.duress
    ? '<div class="hd"><div class="eyebrow">Lagos Drivers Ajo</div><h1 class="big">Round '+S.round+'</h1></div><span data-flow="duress-view"></span>'
    : '<div class="hd"><div class="eyebrow">Lagos Drivers Ajo</div><h1 class="big">Round '+S.round+' · pays '+NAME[S.receiver]+'</h1></div>';
  return hdr+(S.friday===3?'<span data-flow="practice-drill"></span>':'')+
  '<svg class="stage" data-flow="home-glance" viewBox="0 0 394 560" width="394" height="560">'+
    week+friPill+
    '<circle cx="197" cy="268" r="138" fill="#FFFFFF" stroke="#D6E0FF"/>'+
    '<circle cx="197" cy="268" r="126" fill="none" stroke="#EEF2FF" stroke-width="2"/>'+
    recvPath+
    '<defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6E8FFF"/><stop offset="1" stop-color="#3B5BE0"/></linearGradient>'+
    '<filter id="shf" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#2E49C4" flood-opacity="0.3"/></filter></defs>'+
    '<g id="pot" transform="translate('+potPos[0]+' '+potPos[1]+')"><circle r="'+(S.potMoved?30:46)+'" fill="url(#pg)" filter="url(#shf)"/>'+
    '<text y="-3" text-anchor="middle" class="dn" font-size="'+(S.potMoved?11:15)+'" font-weight="800" fill="#fff">$1,200</text>'+
    '<text y="12" text-anchor="middle" font-size="7.5" font-weight="700" letter-spacing="1.5" fill="#D7E0FF">MUSD · POT</text></g>'+
    coins+

function qrSvg(){
  var out='',n=21,c=6;
  function f(x,y){out+='<rect x="'+(x*c)+'" y="'+(y*c)+'" width="'+c+'" height="'+c+'"/>';}
  function fin(ox,oy){for(var i=0;i<7;i++)for(var j=0;j<7;j++){var e=(i===0||i===6||j===0||j===6),m=(i>=2&&i<=4&&j>=2&&j<=4);if(e||m)f(ox+i,oy+j);}}
  fin(0,0);fin(14,0);fin(0,14);
  for(var x=0;x<n;x++)for(var y=0;y<n;y++){var inF=(x<9&&y<9)||(x>11&&y<9)||(x<9&&y>11);
    if(!inF&&((x*31+y*17+x*y*7)%9<4))f(x,y);}
  return '<svg viewBox="0 0 '+(n*c)+' '+(n*c)+'" width="164" height="164" fill="#0C1226">'+out+'</svg>';
}
