<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROSCA — wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@500;600;700;800&family=Wix+Madefor+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#5B7FFF; --blue-deep:#3B5BE0; --blue-press:#2E49C4; --blue-300:#9AB0FF;
  --blue-100:#C9D5FF; --tint:#E9EEFF; --line:#D6E0FF; --line-2:#E8ECFA;
  --bg:#F2F5FD; --paper:#FFFFFF; --ink:#0C1226; --ink-2:#2B3650; --muted:#5E6A85;
  --display:'Wix Madefor Display',sans-serif; --body:'Wix Madefor Text',sans-serif;
  --sh:0 1px 2px rgba(46,73,196,.05),0 24px 50px -28px rgba(46,73,196,.30);
  --sim:#F59E0B; --sim-deep:#B45305; --sim-bg:#FFF7E8; --sim-line:#F4CC7B;
  --under:#101623;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
button{touch-action:manipulation;}
html,body{height:100%;}
body{font-family:var(--body);background:var(--bg);color:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background-image:linear-gradient(#5b7fff0d 1px,transparent 1px),linear-gradient(90deg,#5b7fff0d 1px,transparent 1px);
  background-size:46px 46px;}
.deckbar{font-weight:700;font-size:11px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--blue-deep);display:flex;align-items:center;gap:10px;}
.deckbar::before{content:"";width:26px;height:2px;background:var(--blue);border-radius:2px;}
#frame{width:394px;height:812px;background:linear-gradient(180deg,#1A2140,#0A0E1F);
  border:1px solid #39406A;border-radius:38px;padding:10px;box-shadow:0 40px 80px -30px rgba(12,18,38,.55);
  position:relative;flex:0 0 auto;}
#phone{width:100%;height:100%;background:var(--bg);border-radius:28px;overflow:hidden;
  position:relative;display:flex;flex-direction:column;transition:background .4s;}
#phone.dark{background:var(--under);}
@media (max-width:480px),(max-height:860px){
  body{gap:0;background:var(--bg);}
  .deckbar{display:none;}
  #frame{width:100vw;height:100dvh;border-radius:0;border:none;padding:0;box-shadow:none;}
  #phone{border-radius:0;}
}
#app{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;scrollbar-width:none;}
#app::-webkit-scrollbar{display:none;}
.page{padding:16px 18px 150px;}
.hd{padding:16px 18px 0;}
.eyebrow{font-weight:700;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--blue-deep);}
#phone.dark .eyebrow{color:var(--blue-300);}
h1.big{font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:-.02em;margin:2px 0 0;}
#phone.dark h1.big{color:#F3F6FA;}
.sub{font-size:12.5px;color:var(--muted);line-height:1.45;}
svg text{font-family:var(--body);}
svg .dn{font-family:var(--display);}
.stage{display:block;margin:0 auto;}
g[onclick]{cursor:pointer;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.pulse{animation:pulse 1.6s ease-in-out infinite;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;
  box-shadow:var(--sh);padding:16px;margin-top:12px;}
.balcard{background:linear-gradient(135deg,#6E8FFF,#3B5BE0);color:#fff;border:none;position:relative;overflow:hidden;}
.balcard::after{content:"";position:absolute;right:-40px;top:-52px;width:150px;height:150px;border-radius:50%;background:#ffffff14;}
.balcard .lbl{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.85;}
.balcard .bal{font-family:var(--display);font-weight:800;font-size:32px;letter-spacing:-.02em;margin:4px 0 2px;}
.balcard .bal small{font-size:14px;opacity:.75;font-weight:600;}
.balcard .split2 .btn{background:#ffffff22;border:1px solid #ffffff55;position:relative;z-index:1;}
.rowcard{display:flex;align-items:center;gap:12px;cursor:pointer;}
.rowcard .ic{flex:0 0 42px;width:42px;height:42px;border-radius:13px;background:var(--tint);
  display:flex;align-items:center;justify-content:center;}
.rowcard .ic svg{width:22px;height:22px;stroke:var(--blue-deep);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.rowcard .tx{flex:1;}
.rowcard .tx b{display:block;font-family:var(--display);font-weight:800;font-size:14.5px;}
.rowcard .tx small{display:block;font-size:11.5px;color:var(--muted);margin-top:1px;}
.rowcard .chev{color:#9AB0FF;font-size:16px;font-weight:700;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--sim);margin-left:6px;}
.grid8{display:grid;grid-template-columns:repeat(4,1fr);gap:6px 2px;margin-top:6px;}
.gtile{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 2px;font-family:var(--body);}
.gtile .gi{width:44px;height:44px;border-radius:14px;background:var(--tint);display:flex;align-items:center;justify-content:center;}
.gtile .gi svg{width:22px;height:22px;stroke:var(--blue-deep);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.gtile span{font-size:10.5px;font-weight:600;color:var(--ink-2);}
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2);}
.row:last-child{border-bottom:none;}
.av{flex:0 0 34px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:13px;color:#fff;background:var(--blue);}
.av.b2{background:var(--blue-deep);} .av.b3{background:var(--blue-300);}
.av.lt{background:var(--blue-100);color:var(--blue-deep);} .av.lt2{background:#E6ECFF;color:var(--blue-deep);}
.row .nm{flex:1;font-weight:600;font-size:14px;}
.row .nm small{display:block;font-weight:500;font-size:11px;color:var(--muted);margin-top:1px;}
.row .st{font-size:11.5px;font-weight:700;color:var(--blue-deep);}
.row .st.mut{color:var(--muted);font-weight:600;}
.btn{display:block;width:100%;border:none;border-radius:999px;background:var(--blue);color:#fff;
  font-family:var(--body);font-weight:700;font-size:15px;padding:14px;cursor:pointer;margin-top:14px;}
.btn:active{background:var(--blue-press);}
.btn.sec{background:#fff;color:var(--blue-deep);border:1.5px solid var(--blue);}
.btn:disabled{opacity:.45;}
.split2{display:flex;gap:10px;margin-top:14px;}
.split2 .btn{margin-top:0;flex:1;}
.note{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:10px;}
.okband{background:#EAF7EE;border:1px solid #BFE5C8;color:#1D6B33;border-radius:14px;
  padding:12px;margin-top:12px;font-size:12.5px;font-weight:600;}
.warnband{background:#FDF0F0;border:1px solid #F2C7C7;color:#9B2C2C;border-radius:14px;
  padding:12px;margin-top:12px;font-size:12.5px;font-weight:600;}
.pendband{background:var(--tint);border:1px solid var(--line);color:var(--ink-2);border-radius:14px;
  padding:12px;margin-top:12px;font-size:12.5px;font-weight:600;line-height:1.5;}
.keys{display:flex;gap:8px;margin-top:12px;}
.key{flex:1;border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center;
  font-size:11px;font-weight:600;color:var(--ink-2);background:#fff;}
.key.on{border-color:var(--blue);background:var(--tint);color:var(--blue-deep);font-weight:700;}
.key.hot{border-color:var(--sim);background:#FFF7E8;color:var(--sim-deep);font-weight:700;}
.gring{display:flex;gap:10px;margin-top:10px;}
.gring .av{width:38px;height:38px;font-size:14px;}
.scanrow{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:14px;
  padding:12px;margin-top:10px;cursor:pointer;background:#fff;font-weight:700;font-size:13px;color:var(--blue-deep);}
.scanrow svg{width:22px;height:22px;stroke:var(--blue-deep);fill:none;stroke-width:1.8;}
/* bottom tab bar — the familiar money-app shell */
#nav{flex:0 0 auto;display:flex;border-top:1px solid var(--line-2);background:#fff;
  padding:8px 6px calc(12px + env(safe-area-inset-bottom));position:relative;z-index:17;}
#nav button{flex:1;background:none;border:none;font-family:var(--body);font-size:10px;font-weight:600;
  color:#8E99B9;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative;}
#nav button.on{color:var(--blue-deep);font-weight:700;}
#nav svg{width:21px;height:21px;stroke:#8E99B9;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
#nav button.on svg{stroke:var(--blue-deep);}
#nav .ndot{position:absolute;top:-1px;right:calc(50% - 16px);width:8px;height:8px;border-radius:50%;background:var(--sim);}
/* product bottom sheet — pages are never replaced */
#pscrim{position:absolute;inset:0;background:rgba(12,18,38,.4);z-index:41;display:none;}
#pscrim.on{display:block;}
#psheet{position:absolute;left:0;right:0;bottom:0;z-index:42;background:var(--paper);
  border-radius:22px 22px 0 0;box-shadow:0 -18px 50px -20px rgba(12,18,38,.4);
  transform:translateY(105%);transition:transform .3s cubic-bezier(.16,1,.3,1);
  max-height:84%;display:flex;flex-direction:column;}
#psheet.on{transform:translateY(0);}
#psheet .grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:10px auto 0;}
#psheet .phead{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 4px;}
#psheet .phead .ttl{font-family:var(--display);font-weight:800;font-size:17px;}
#psheet .phead .x{border:none;background:var(--bg);width:30px;height:30px;border-radius:50%;
  font-size:14px;color:var(--ink-2);cursor:pointer;}
#psheet .pbody{overflow-y:auto;padding:2px 18px 100px;}
.pindots{display:flex;gap:12px;justify-content:center;margin:20px 0;}
.pindots i{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--blue-300);}
.pindots i.on{background:var(--blue);border-color:var(--blue);}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:250px;margin:0 auto;}
.pad button{background:var(--bg);border:1px solid var(--line);border-radius:16px;
  font-family:var(--display);font-weight:700;font-size:20px;padding:14px 0;cursor:pointer;color:var(--ink);}
.pad button:active{background:var(--tint);}
.amt{font-family:var(--display);font-weight:800;font-size:38px;text-align:center;margin:14px 0 4px;letter-spacing:-.02em;}
.amt small{font-size:16px;color:var(--muted);}
.quick{display:flex;gap:8px;justify-content:center;margin:8px 0 10px;flex-wrap:wrap;}
.quick button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;
  font-weight:700;font-size:12.5px;color:var(--blue-deep);cursor:pointer;}
.quick button:disabled{opacity:.35;}
.quick button.on{background:var(--tint);border-color:var(--blue);}
.bigok{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 0 8px;}
.bigok .disc{width:78px;height:78px;border-radius:50%;background:var(--blue);display:flex;align-items:center;
  justify-content:center;animation:pop .45s cubic-bezier(.16,1,.3,1);}
@keyframes pop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.bigok svg{width:36px;height:36px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.bigok h2{font-family:var(--display);font-weight:800;font-size:19px;margin-top:14px;}
#toast{position:absolute;left:14px;right:14px;top:14px;z-index:60;background:var(--ink);color:#fff;
  border-radius:14px;padding:12px 14px;font-size:12.5px;font-weight:600;display:none;
  box-shadow:0 18px 40px -12px rgba(12,18,38,.5);line-height:1.4;}
#toast.on{display:block;animation:tin .3s cubic-bezier(.16,1,.3,1);}
@keyframes tin{from{transform:translateY(-16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
#toast.sim{background:var(--sim-deep);}
/* GUIDE + SIM (amber = not the product) */
#guide{position:absolute;left:12px;right:96px;bottom:86px;z-index:39;display:flex;align-items:center;gap:9px;
  background:var(--sim-bg);border:1.5px dashed var(--sim-deep);border-radius:14px;padding:9px 11px;cursor:pointer;}
#guide .gtag{flex:0 0 auto;background:var(--sim-deep);color:#fff;font-size:8.5px;font-weight:800;
  letter-spacing:.14em;border-radius:5px;padding:2px 6px;}
#guide .gtx{flex:1;font-size:11.5px;font-weight:700;color:#5b3305;line-height:1.3;}
#guide .gx{flex:0 0 auto;border:none;background:none;color:#8a5a10;font-size:13px;cursor:pointer;padding:2px 4px;}
#fab{position:absolute;right:12px;bottom:86px;z-index:48;border:2px dashed var(--sim-deep);
  background:repeating-linear-gradient(45deg,var(--sim),var(--sim) 10px,#f8b83d 10px,#f8b83d 20px);
  color:#5b3305;font-family:var(--body);font-weight:800;font-size:11px;letter-spacing:.06em;
  border-radius:14px;padding:10px 11px;cursor:pointer;box-shadow:0 12px 26px -10px rgba(180,83,9,.55);}
#scrim{position:absolute;inset:0;background:rgba(12,18,38,.45);z-index:49;display:none;}
#scrim.on{display:block;}
#sheet{position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--sim-bg);
  border:2px dashed var(--sim-deep);border-bottom:none;border-radius:22px 22px 0 0;
  transform:translateY(105%);transition:transform .32s cubic-bezier(.16,1,.3,1);
  max-height:78%;display:flex;flex-direction:column;}
#sheet.on{transform:translateY(0);}
#sheet .shead{padding:14px 16px 10px;border-bottom:1px dashed var(--sim-line);}
#sheet .shead .tag{display:inline-block;background:var(--sim-deep);color:#fff;font-size:9.5px;font-weight:800;
  letter-spacing:.18em;border-radius:6px;padding:3px 8px;}
#sheet .shead h3{font-family:var(--display);font-weight:800;font-size:15px;color:#5b3305;margin-top:7px;}
#sheet .shead p{font-size:11px;color:#8a5a10;margin-top:3px;line-height:1.4;}
#sheet .sbody{overflow-y:auto;padding:10px 16px 20px;}
.slab{font-size:9.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#8a5a10;margin:12px 0 6px;}
.sact{display:flex;align-items:center;gap:11px;width:100%;background:#fff;border:1.5px dashed var(--sim);
  border-radius:14px;padding:11px 12px;margin-bottom:8px;cursor:pointer;text-align:left;font-family:var(--body);}
.sact:disabled{opacity:.4;cursor:default;}
.sact .sav{flex:0 0 32px;width:32px;height:32px;border-radius:50%;background:var(--sim);color:#5b3305;
  font-family:var(--display);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
.sact .stx{flex:1;}
.sact .stx b{display:block;font-size:13px;color:#3d2a05;}
.sact .stx small{display:block;font-size:10.5px;color:#8a5a10;margin-top:1px;line-height:1.35;}
.sclose{margin:2px 16px 16px;border:none;background:none;color:#8a5a10;font-weight:700;font-size:12px;
  text-decoration:underline;cursor:pointer;font-family:var(--body);}
</style>
</head>
<body>
<div class="deckbar">Riften Labs · wallet + the table — interactive mockup</div>
<div id="frame"><div id="phone">
  <div id="app"></div>
  <div id="nav"></div>
  <div id="pscrim" onclick="closeP()"></div>
  <div id="psheet"></div>
  <div id="guide" onclick="guideTap()"><span class="gtag">NEXT</span><span class="gtx" id="gtx"></span><button class="gx" onclick="event.stopPropagation();dispatch({type:'GUIDE_OFF'})">✕</button></div>
  <button id="fab" onclick="openSheet()">SIM</button>
  <div id="scrim" onclick="closeSheet()"></div>
  <div id="sheet"></div>
  <div id="toast"></div>
</div></div>

<script>
/* ============ WALLET + THE TABLE ============
   The shell is the familiar Nigerian money app (balance card, services grid,
   bottom tabs). The Circle tab is the one off-mode thing: the table. Every
   state change goes through one guarded dispatch(); the SIM sheet and the
   GUIDE are pure functions of the same state. */

var POS={A:[197,130],F:[266,149],C:[315,202],Y:[330,268],K:[315,334],H:[266,387],
         B:[128,387],O:[79,334],D:[64,268],S:[79,202],G:[128,149],T:[197,406]};
var NAME={A:'Amaka O.',C:'Chinedu E.',B:'Bisi L.',H:'Halima S.',E:'Emeka',F:'Funke A.',
          Y:'Yemi K.',K:'Kunle A.',O:'Ojo T.',D:'Dele I.',S:'Sade M.',G:'Gbenga F.',T:'You'};
var SHORT={A:'Amaka',C:'Chinedu',B:'Bisi',H:'Halima',F:'Funke',Y:'Yemi',K:'Kunle',
           O:'Ojo',D:'Dele',S:'Sade',G:'Gbenga',T:'You'};
var FRIDAYS={A:214,C:214,B:102,H:87,F:190,Y:26,K:26,O:61,D:143,S:88,G:150,T:214};
var RING={A:3,C:2,D:1,G:1,F:1,T:2,H:1,B:1,Y:0,K:0,O:0,S:0};
var CONTACTS=['Emeka','Adaeze','Ngozi','Femi'];   /* the phone's contact book */
var SOLID={A:'#C9D5FF',F:'#3B5BE0',C:'#5B7FFF',H:'#9AB0FF',D:'#5B7FFF',G:'#3B5BE0',T:'#5B7FFF'};

var S;
function initState(){S={
  phase:'invite', tab:'home',
  balance:0, vault:0,
  funded:false, contributed:false,
  am:null,                 /* add-money session: null | waiting | loaded */
  co:null,                 /* cash-out session: null | {state:waiting|done, amt} */
  wd:null,                 /* withdrawal: null | {state:key|timer|ready|cancelled|done, amt, dest} */
  card:'none', cardWait:false,      /* second key: the NFC card — enrolled by a physical tap */
  remote:null,             /* second key: a person — null | {name, state:invited|active} */
  keepers:[],              /* recovery quorum — [{id, state:invited|active}], chosen by the user */
  heir:null,               /* inheritance — null | {name}, named by the user */
  friday:'idle',           /* idle | gather | refresh | drill | close */
  paid:['A','F','C','D','G'], refreshDone:[], drillDark:false, drillConfirms:[],
  lost:false, restoreConfirms:[],
  heirFired:false, monthSix:false, guide:true,
  round:6, receiver:'A', potMoved:false,
};}
initState();
function potVal(){return 100*S.paid.length;}
/* derived setup facts — the vault activates by arithmetic, never by button */
function keysN(){return 1+(S.card==='enrolled'?1:0)+((S.remote&&S.remote.state==='active')?1:0);}
function vaultActive(){return keysN()>=2;}
function actKeepers(){return S.keepers.filter(function(x){return x.state==='active';});}
function keeperIds(){return actKeepers().map(function(x){return x.id;});}
function fm(x){return '$'+x.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fm0(x){return '$'+Math.round(x).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}
var tmr=null;
function toast(m,sim){var t=document.getElementById('toast');t.textContent=m;
  t.className='on'+(sim?' sim':'');clearTimeout(tmr);tmr=setTimeout(function(){t.className='';},2600);}

/* ---------- THE STATE MACHINE: one guarded reducer ---------- */
function dispatch(ev){
  var t=ev.type, out=null, sim=false;
  switch(t){
  case 'JOIN': if(S.phase!=='invite')return; S.phase='app'; break;
  case 'ADD_OPEN': S.am='waiting'; break;
  case 'AGENT_SCAN': if(S.am!=='waiting')return; S.am='loaded'; S.balance+=137.50; S.funded=true;
    out='Agent loaded $137.50.'; sim=true; break;
  case 'ADD_DONE': S.am=null; break;
  case 'CO_OPEN': if(S.co)return; if(ev.amt<=0||ev.amt>S.balance)return toast('Not enough in balance.');
    S.co={state:'waiting',amt:ev.amt}; break;
  case 'AGENT_PAY': if(!S.co||S.co.state!=='waiting')return; S.co.state='done'; S.balance-=S.co.amt;
    out='Agent paid '+fm(S.co.amt)+' in cash.'; sim=true; break;
  case 'CO_DONE': S.co=null; break;
  case 'PAY': if(ev.amt<=0||ev.amt>S.balance)return toast('Not enough in balance.');
    S.balance-=ev.amt; out='Paid '+fm(ev.amt)+' — '+ev.label+'.'; break;
  case 'PAY_ROUND':
    if(S.contributed)return;
    if(S.balance<100){toast('Balance is short — add money.');S.am='waiting';break;}
    S.balance-=100; S.contributed=true; S.paid.push('T'); out='Round '+S.round+' paid.'; break;
  case 'KEEPERS_INVITE': if(S.keepers.length||!ev.ids||ev.ids.length!==5)return;
    S.keepers=ev.ids.map(function(id){return {id:id,state:'invited'};});
    out='5 keepers invited.'; break;
  case 'KEEPER_ACCEPT': var kk=S.keepers.filter(function(x){return x.id===ev.id&&x.state==='invited';})[0];
    if(!kk)return; kk.state='active'; out=NAME[ev.id]+' accepted — share stored.'; sim=true; break;
  case 'CARD_START': if(S.card!=='none'||S.cardWait)return; S.cardWait=true; break;
  case 'CARD_TAP': if(!S.cardWait)return; S.card='enrolled'; S.cardWait=false;
    out='Card enrolled as a key.'; sim=true; break;
  case 'REMOTE_INVITE': if(S.remote)return; S.remote={name:ev.name,state:'invited'}; break;
  case 'REMOTE_ACCEPT': if(!S.remote||S.remote.state!=='invited')return; S.remote.state='active';
    out=S.remote.name+' accepted the key.'; sim=true; break;
  case 'HEIR_SET': if(S.heir)return; S.heir={name:ev.name}; out='Heir set.'; break;
  case 'DEPOSIT': if(!vaultActive())return toast('The vault needs 2 keys first.');
    if(ev.amt<=0||ev.amt>S.balance)return toast('Not enough in balance.');
    S.balance-=ev.amt; S.vault+=ev.amt; out='Moved '+fm(ev.amt)+' to the vault.'; break;
  case 'WD_START': if(!vaultActive()||S.wd)return;
    if(ev.amt<=0||ev.amt>S.vault)return toast('The vault only holds '+fm(S.vault)+'.');
    S.wd={state:ev.mode==='wait'?'timer':'key', amt:ev.amt, dest:ev.dest}; break;
  case 'WD_KEY': if(!S.wd||S.wd.state!=='key')return; finishWd(); out='Second key signed. Sent.'; sim=true; break;
  case 'WD_TIMER': if(!S.wd||S.wd.state!=='timer')return; S.wd.state='ready'; out='72 hours passed.'; sim=true; break;
  case 'WD_RELEASE': if(!S.wd||S.wd.state!=='ready')return; finishWd(); out='Released.'; break;
  case 'WD_CANCEL': if(!S.wd||(S.wd.state!=='key'&&S.wd.state!=='timer'))return;
    S.wd={state:'cancelled',amt:S.wd.amt,dest:S.wd.dest}; out='Amaka cancelled it. Nothing moved.'; sim=true; break;
  case 'WD_CLEAR': if(!S.wd||(S.wd.state!=='cancelled'&&S.wd.state!=='done'))return; S.wd=null; break;
  case 'FRIDAY_OPEN': if(S.friday!=='idle')return; S.friday='gather'; out='Friday. The meeting is open.'; sim=true; break;
  case 'MEMBERS_PAY': if(S.friday!=='gather')return;
    Object.keys(POS).forEach(function(k){if(k!=='T'&&S.paid.indexOf(k)<0)S.paid.push(k);});
    out='Every other member paid in.'; sim=true; break;
  case 'PAYOUT': if(S.friday!=='gather')return;
    if(S.paid.length<12)return toast('The pot holds '+fm0(potVal())+' — '+(12-S.paid.length)+' still due.');
    S.potMoved=true; S.friday=(actKeepers().length>0?'refresh':'close');
    out='Pot paid to '+NAME[S.receiver]+'.'; sim=true; break;
  case 'KEEPER_CHECK': if(S.friday!=='refresh'||S.refreshDone.indexOf(ev.k)>=0)return;
    if(keeperIds().indexOf(ev.k)<0)return;
    S.refreshDone.push(ev.k);
    if(S.refreshDone.length>=actKeepers().length)S.friday=(actKeepers().length>=3?'drill':'close');
    out=NAME[ev.k]+"'s recovery share checked."; sim=true; break;
  case 'DRILL_WIPE': if(S.friday!=='drill'||S.drillDark)return; S.drillDark=true;
    out='Halima wiped her phone. Drill.'; sim=true; break;
  case 'DRILL_CONFIRM': if(S.friday!=='drill'||!S.drillDark||S.drillConfirms.indexOf(ev.k)>=0)return;
    S.drillConfirms.push(ev.k);
    if(S.drillConfirms.length>=3){S.drillDark=false;S.friday='close';out='Halima restored. Drill passed.';}
    else out=NAME[ev.k]+' confirmed.';
    sim=true; break;
  case 'MEETING_CLOSE': if(S.friday!=='close')return;
    S.round++; S.receiver='F'; S.paid=[]; S.contributed=false; S.potMoved=false;
    S.friday='idle'; S.refreshDone=[]; S.drillConfirms=[];
    out='Round '+S.round+' started. Pays '+NAME[S.receiver]+'.'; sim=true; break;
  case 'PAYDAY': if(!S.funded)return; S.balance+=120; out='Pay-day: +$120.'; sim=true; break;
  case 'STEAL': if(S.lost||actKeepers().length<3)return; S.lost=true; S.restoreConfirms=[];
    out='The phone is gone.'; sim=true; break;
  case 'RESTORE_CONFIRM': if(!S.lost||S.restoreConfirms.indexOf(ev.k)>=0)return;
    S.restoreConfirms.push(ev.k); out=NAME[ev.k]+' confirmed.'; sim=true; break;
  case 'RESTORE_DONE': if(!S.lost||S.restoreConfirms.length<3)return;
    S.lost=false; S.restoreConfirms=[]; out='Restored. Same money, new phone.'; break;
  case 'HEIR': if(!S.heir||S.heirFired||actKeepers().length<3)return; S.heirFired=true;
    out='90 silent days. '+S.heir.name+' and the keepers notified.'; sim=true; break;
  case 'MONTH6': S.phase='app'; S.monthSix=true; S.funded=true;
    S.card='enrolled'; S.cardWait=false; S.remote={name:'Emeka',state:'active'};
    S.keepers=['A','C','B','H','F'].map(function(id){return {id:id,state:'active'};});
    S.heir={name:'Adaeze'};
    S.balance=137.50; S.vault=410.00; S.contributed=false; S.lost=false; S.am=null; S.co=null; S.wd=null;
    out='Month six.'; sim=true; break;
  case 'GUIDE_OFF': S.guide=false; break;
  default: return;
  }
  render();
  if(out)toast(out,sim);
}
function finishWd(){
  var w=S.wd; S.vault-=w.amt;
  if(w.dest==='To balance')S.balance+=w.amt;
  S.wd={state:'done',amt:w.amt,dest:w.dest};
}

/* ---------- THE GUIDE ---------- */
function hint(){
  if(S.phase==='invite')return {t:'Tap “Take your seat”.'};
  if(S.lost)return S.restoreConfirms.length>=3
    ? {t:'Tap “Open my wallet”.'}
    : {t:'Open SIM — 3 keepers confirm you.',sim:true};
  if(S.am==='waiting')return {t:'Open SIM — the agent scans your code.',sim:true};
  if(S.co&&S.co.state==='waiting')return {t:'Open SIM — the agent pays the cash.',sim:true};
  if(!S.funded)return {t:'Home — tap “Add money”.'};
  if(!S.contributed&&S.friday==='idle')return S.tab==='circle'
    ? {t:'Tap the pot — pay your $100 round.'}
    : {t:'Open the Circle tab.'};
  if(S.cardWait)return {t:'Open SIM — the card touches the phone.',sim:true};
  if(S.keepers.some(function(x){return x.state==='invited';}))return {t:'Open SIM — keepers accept.',sim:true};
  if(S.remote&&S.remote.state==='invited')return {t:'Open SIM — '+S.remote.name+' accepts the key.',sim:true};
  if(!S.keepers.length)return {t:'Home — Vault → choose 5 keepers.'};
  if(!vaultActive())return {t:'Vault setup — add a second key (the card).'};
  if(S.vault===0&&!S.wd)return S.balance>=20
    ? {t:'Home — Vault → deposit.'}
    : {t:'Open SIM — pay-day brings money.',sim:true};
  if(S.wd&&S.wd.state==='key')return {t:'Open SIM — the card or Emeka signs. Or Amaka cancels.',sim:true};
  if(S.wd&&S.wd.state==='timer')return {t:'Open SIM — let 72h pass, or Amaka cancels.',sim:true};
  if(S.wd&&S.wd.state==='ready')return {t:'Home — Vault → release the withdrawal.'};
  if(S.wd&&(S.wd.state==='cancelled'||S.wd.state==='done'))return {t:'Vault — clear the receipt. Then SIM → “It’s Friday”.'};
  if(S.friday==='idle'&&!S.monthSix)return {t:'Open SIM — “It’s Friday”.',sim:true};
  if(S.friday==='gather')return S.paid.length<12
    ? (S.contributed?{t:'Open SIM — the other members pay in, then the payout.',sim:true}
                    :{t:'Circle tab — the pot — your $100 is due before payout.'})
    : {t:'Open SIM — pay out the pot.',sim:true};
  if(S.friday==='refresh')return {t:'Open SIM — each keeper checks in.',sim:true};
  if(S.friday==='drill')return {t:'Open SIM — Halima runs the restore drill.',sim:true};
  if(S.friday==='close')return {t:'Open SIM — close the meeting.',sim:true};
  if(!S.heir)return {t:'Home — Vault → name your heir.'};
  return {t:'Explore — or SIM: steal the phone, 90 days of silence, restart.',sim:true};
}

function qrSvg(){
  var out='',n=21,c=6;
  function f(x,y){out+='<rect x="'+(x*c)+'" y="'+(y*c)+'" width="'+c+'" height="'+c+'"/>';}
  function fin(ox,oy){for(var i=0;i<7;i++)for(var j=0;j<7;j++){var e=(i===0||i===6||j===0||j===6),m=(i>=2&&i<=4&&j>=2&&j<=4);if(e||m)f(ox+i,oy+j);}}
  fin(0,0);fin(14,0);fin(0,14);
  for(var x=0;x<n;x++)for(var y=0;y<n;y++){var inF=(x<9&&y<9)||(x>11&&y<9)||(x<9&&y>11);
    if(!inF&&((x*31+y*17+x*y*7)%9<4))f(x,y);}
  return '<svg viewBox="0 0 '+(n*c)+' '+(n*c)+'" width="150" height="150" fill="#0C1226">'+out+'</svg>';
}

    if(S.am==='waiting')
      b+='<div class="slab">Pending — add money</div>'
        +sact('M','Agent scans the code','+$137.50 → balance',sd({type:'AGENT_SCAN'})+';closeSheet();addSheet()');
    if(S.co&&S.co.state==='waiting')
      b+='<div class="slab">Pending — cash out ('+fm(S.co.amt)+')</div>'
        +sact('M','Agent scans and pays cash','−'+fm(S.co.amt)+' → your hand',sd({type:'AGENT_PAY'})+';closeSheet();cashSheet()');
    if(S.cardWait)
      b+='<div class="slab">Pending — card enrolment</div>'
        +sact('▣','The card touches the phone','NFC — enrols it as a key',sd({type:'CARD_TAP'})+';closeSheet();cardScreen()');
    S.keepers.filter(function(x){return x.state==='invited';}).forEach(function(x,i){
      if(i===0)b+='<div class="slab">Pending — keeper invitations</div>';
      b+=sact(x.id,NAME[x.id]+' accepts','their phone stores a recovery share',sd({type:'KEEPER_ACCEPT',id:x.id}));
    });
    if(S.remote&&S.remote.state==='invited')
      b+='<div class="slab">Pending — remote key</div>'
        +sact(S.remote.name[0],S.remote.name+' accepts the key','on their phone, far from Lagos',sd({type:'REMOTE_ACCEPT'})+';closeSheet();setupSheet()');
    if(S.wd&&S.wd.state==='key'){
      b+='<div class="slab">Pending — second key ('+fm(S.wd.amt)+')</div>';
      if(S.card==='enrolled')b+=sact('▣','Tap the NFC card','the second key','closeSheet();'+sd({type:'WD_KEY'})+';vaultSheet()');
      if(S.remote&&S.remote.state==='active')b+=sact(S.remote.name[0],S.remote.name+' signs','from their phone · 2:47 AM there','closeSheet();'+sd({type:'WD_KEY'})+';vaultSheet()');
      b+=sact('A','A keeper cancels it','any keeper can','closeSheet();'+sd({type:'WD_CANCEL'})+';vaultSheet()');
    }
    if(S.wd&&S.wd.state==='timer')
      b+='<div class="slab">Pending — 72h withdrawal ('+fm(S.wd.amt)+')</div>'
        +sact('⏱','Let 72 hours pass','no keeper objects','closeSheet();'+sd({type:'WD_TIMER'})+';vaultSheet()')
        +sact('A','Amaka cancels it','inside the window','closeSheet();'+sd({type:'WD_CANCEL'})+';vaultSheet()');
    if(S.lost){
      b+='<div class="slab">Restore — keepers confirm (any 3)</div>';
      keeperIds().forEach(function(k){
        var done=S.restoreConfirms.indexOf(k)>=0;
        b+=sact(k,'Confirm as '+NAME[k],done?'confirmed':'in person',sd({type:'RESTORE_CONFIRM',k:k}),done||S.restoreConfirms.length>=3);
      });
    }
    if(S.friday==='gather'){
      b+='<div class="slab">Friday — the meeting</div>'
        +sact('◎','The other members pay in','everyone but you settles up',sd({type:'MEMBERS_PAY'}),S.paid.length>=11&&S.contributed)
        +sact('▶','Pay out the pot',(S.paid.length<12?'blocked — the pot holds '+fm0(potVal())+', '+(12-S.paid.length)+' still due':fm0(potVal())+' → '+NAME[S.receiver]),'closeSheet();'+sd({type:'PAYOUT'}),S.paid.length<12);
    }
    if(S.friday==='refresh'){
      b+='<div class="slab">Friday — keeper check</div>';
      keeperIds().forEach(function(k){
        var done=S.refreshDone.indexOf(k)>=0;
        b+=sact(k,'Check in — '+NAME[k],done?'done':'proves their recovery share still works',sd({type:'KEEPER_CHECK',k:k}),done);
      });
    }
    if(S.friday==='drill'){
      b+='<div class="slab">Friday — the restore drill</div>';
      if(!S.drillDark)b+=sact('H','Halima wipes her phone','a practice run of losing everything',sd({type:'DRILL_WIPE'}));
      else keeperIds().slice(0,3).forEach(function(k){
        var done=S.drillConfirms.indexOf(k)>=0;
        b+=sact(k,'Confirm — '+NAME[k],done?'done':'helps restore her',sd({type:'DRILL_CONFIRM',k:k}),done);
      });
    }
    if(S.friday==='close')
      b+='<div class="slab">Friday — close</div>'
        +sact('✓','Close the meeting','round '+(S.round+1)+' starts','closeSheet();'+sd({type:'MEETING_CLOSE'}));
    b+='<div class="slab">World controls</div>';
    if(S.funded)b+=sact('$','Pay-day','+$120 → balance','closeSheet();'+sd({type:'PAYDAY'}));
    if(S.friday==='idle')b+=sact('📅','It\'s Friday','the weekly meeting opens',sd({type:'FRIDAY_OPEN'}));
    if(!S.lost)b+=sact('✕','Steal the phone',actKeepers().length>=3?'then watch 3 keepers restore you':'blocked — needs 3 accepted keepers','closeSheet();closeP();'+sd({type:'STEAL'}),actKeepers().length<3);
    if(S.heir&&!S.heirFired)b+=sact('🕯','Owner silent for 90 days','the vault starts moving to '+S.heir.name,'closeSheet();'+sd({type:'HEIR'})+';go(\'me\')',actKeepers().length<3);
    if(!S.monthSix)b+=sact('6','Skip to month six','a mature wallet','closeSheet();closeP();'+sd({type:'MONTH6'}));
    b+=sact('↺','Restart','back to the invitation','location.reload()');
  }
  document.getElementById('sheet').innerHTML=
  '<div class="shead"><span class="tag">SIMULATION LAYER</span>'+
  '<h3>Other parties &amp; time</h3><p>Not part of the app. The taps other people (or time) would make.</p></div>'+
  '<div class="sbody">'+b+'</div>'+
  '<button class="sclose" onclick="closeSheet()">close</button>';
}

/* kill double-tap zoom, keep pinch zoom */
(function(){
  var last=0;
  document.addEventListener('touchend',function(e){
    var now=Date.now();
    if(now-last<350&&e.changedTouches.length===1)e.preventDefault();
    last=now;
  },{passive:false});
})();

render();
</script>
</body>
</html>
